<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihal Fitness | Scan Attendance</title>
    <!-- Library for QR scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            background: #0B1220; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        #reader { width: 320px; border-radius: 20px; overflow: hidden; }
        .info { margin-top: 20px; text-align: center; color: #94A3B8; padding: 0 20px; }
    </style>
</head>
<body>

    <h2>Scan QR for Attendance</h2>
    <div id="reader"></div>
    <div class="info" id="status">Point your camera at the gym's QR code.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3NWRwulNabXgSPS7vk5SVTUJUtUk9WzU",
            authDomain: "nihal-fitness.firebaseapp.com",
            projectId: "nihal-fitness",
            storageBucket: "nihal-fitness.firebasestorage.app",
            messagingSenderId: "679343097767",
            appId: "1:679343097767:web:11da398a69c6d836c11882",
            measurementId: "G-WSM58PVPZO"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Attendance Logic
        async function handleAttendance(user) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) return;

            const now = new Date();
            const lastWorkout = new Date(userSnap.data().lastWorkoutDate || 0);
            const diffHours = (now - lastWorkout) / (1000 * 60 * 60);
            
            // Prevent double check-in within the same day
            if (now.toDateString() === lastWorkout.toDateString()) {
                document.getElementById("status").innerText = "You already checked in today! ✅";
                return;
            }

            let streak = userSnap.data().workoutStreak || 0;

            // Streak Logic: If > 48 hours, reset to 1. If between 24-48, increment.
            if (diffHours > 48) {
                streak = 1;
            } else if (diffHours > 24) {
                streak += 1;
            }

            await updateDoc(userRef, {
                workoutStreak: streak,
                lastWorkoutDate: now.toISOString()
            });

            document.getElementById("status").innerText = "Attendance Marked! 🔥";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
        }

        // Scanner Success Handler
        function onScanSuccess(decodedText) {
            try {
                const data = JSON.parse(decodedText);
                if (data.gymId === "nihal-fitness") {
                    document.getElementById("status").innerText = "Processing...";
                    const user = auth.currentUser;
                    if (user) {
                        handleAttendance(user);
                    } else {
                        alert("Please login first.");
                    }
                } else {
                    alert("Invalid QR Code.");
                }
            } catch (e) {
                alert("Invalid QR format.");
            }
        }

        // Initialize Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
