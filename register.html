<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nihal Fitness | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:auto;
}

body::before{
content:"";
position:absolute;
width:420px;
height:420px;
background:#FFC107;
filter:blur(180px);
top:-120px;
left:-120px;
opacity:.20;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#FF9800;
filter:blur(180px);
right:-100px;
bottom:-100px;
opacity:.18;
}

.container{

width:380px;
padding:35px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 50px rgba(0,0,0,.45);
position:relative;
z-index:2;

}

.logo{

width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(135deg,#FFC107,#FF9800);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
margin:auto;
margin-bottom:18px;

}

h2{

text-align:center;
color:#fff;
margin-bottom:5px;

}

.subtitle{

text-align:center;
color:#bbb;
margin-bottom:25px;
font-size:14px;

}

.inputBox{

margin-bottom:16px;

}

.inputBox input{

width:100%;
padding:14px;
background:#1b1b1b;
border:none;
outline:none;
border-radius:12px;
color:white;
font-size:15px;

}

.inputBox input:focus{

border:2px solid #FFC107;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#FFC107,#FF9800);
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:translateY(-2px);

}

.loading{

display:none;
text-align:center;
margin-top:15px;
color:#FFC107;

}

.bottom{

margin-top:25px;
text-align:center;
color:#bbb;

}

.bottom a{

color:#FFC107;
text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🏋️
</div>

<h2>Create Account</h2>

<p class="subtitle">
Join Nihal Fitness
</p>

<div class="inputBox">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="inputBox">
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="inputBox">
<input type="text" id="phone" placeholder="Mobile Number">
</div>

<div class="inputBox">
<input type="password" id="password" placeholder="Password">
</div>

<div class="inputBox">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
</div>

<button onclick="register()">

CREATE ACCOUNT

</button>

<div class="loading" id="loading">

Creating Account...

</div>

<div class="bottom">

Already have an account?

<a href="index.html">

Login

</a>

</div>

</div>

<!-- Register Part 2 starts from here -->
 <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* =====================
   Firebase Config
====================== */

const firebaseConfig = {

apiKey: "AIzaSyB3NWRwulNabXgSPS7vk5SVTUJUtUk9WzU",

authDomain: "nihal-fitness.firebaseapp.com",

projectId: "nihal-fitness",

storageBucket: "nihal-fitness.firebasestorage.app",

messagingSenderId: "679343097767",

appId: "1:679343097767:web:11da398a69c6d836c11882",

measurementId: "G-WSM58PVPZO"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* =====================
   Register Function
====================== */

window.register = async function(){

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const phone=document.getElementById("phone").value.trim();

const password=document.getElementById("password").value;

const confirm=document.getElementById("confirmPassword").value;

const loading=document.getElementById("loading");

if(name==""||email==""||phone==""||password==""||confirm==""){

alert("Please fill all fields.");

return;

}

if(password!==confirm){

alert("Passwords do not match.");

return;

}

loading.style.display="block";

try{

const userCredential=
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user=userCredential.user;
/* ==========================
   Save User Data to Firestore
========================== */

await setDoc(doc(db, "users", user.uid), {

    uid: user.uid,

    fullName: name,

    email: email,

    phone: phone,

    membership: "Free",

    role: "member",
    workoutStreak : 0,
    lastWorkoutDate: "",
    createdAt: new Date().toISOString()

});

loading.innerHTML = "Account Created Successfully ✅";

setTimeout(() => {

    window.location.href = "index.html";

}, 1500);

}
catch(error){

loading.style.display="none";

switch(error.code){

case "auth/email-already-in-use":
alert("Email already exists.");
break;

case "auth/invalid-email":
alert("Invalid email address.");
break;

case "auth/weak-password":
alert("Password should be at least 6 characters.");
break;

default:
alert(error.message);

}

}

};

</script>

</body>

</html>
